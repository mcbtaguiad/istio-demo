name: tags-cicd
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  checkout:
    runs-on: ubuntu-latest
    outputs:
      repo-path: ${{ steps.repo-path.outputs.path }}
    steps:
      - name: Checkout repository
        id: repo-path
        uses: actions/checkout@v4

  # --- Go Tests ---
  backend-test:
    needs: checkout

    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [1.25]   # set your Go version

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      # - name: Install dependencies
      #   working-directory: docker/backend
      #   run: go mod tidy

      - name: Run Go tests
        working-directory: docker/backend
        # run: go test ./... -v
        run: go test -v main_test.go

  # --- Python Tests ---
  monitor-test:
    needs: checkout

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.12.8] 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install flask pytest pylint black flake8 isort pytest-cov

      - name: Run pytest
        run: pytest docker/monitor --cov=docker/monitor

      - name: Lint with pylint
        run: pylint docker/monitor/app.py

      - name: Format check with black
        run: black --check docker/monitor/app.py

      - name: Import check with isort
        run: isort --check-only docker/monitor/app.py

  # --- React Tests ---
  frontend-test:
    needs: checkout

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: docker/frontend/package-lock.json

      - name: Install dependencies
        working-directory: docker/frontend
        run: npm ci   # ✅ deterministic install

      - name: Run React tests
        working-directory: docker/frontend
        run: npm run test -- --coverage
