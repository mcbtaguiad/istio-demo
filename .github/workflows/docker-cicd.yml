name: tags-cicd
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  checkout:
    runs-on: ubuntu-latest
    outputs:
      repo-path: ${{ steps.repo-path.outputs.path }}
    steps:
      - name: Checkout repository
        id: repo-path
        uses: actions/checkout@v4

  # --- Go Tests ---
  backend-test:
    needs: checkout

    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [1.25.7] 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        working-directory: docker/backend
        run: go mod tidy

      - name: Run Go tests
        working-directory: docker/backend
        run: go test ./... -v
        # run: go test -v main_test.go

  # --- Python Tests ---
  monitor-test:
    needs: checkout

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.12.8] 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install flask pytest pylint black flake8 isort pytest-cov

      - name: Run pytest
        run: pytest docker/monitor --cov=docker/monitor

      - name: Lint with pylint
        run: pylint docker/monitor/app.py

      - name: Format check with black
        run: black --check docker/monitor/app.py

      - name: Import check with isort
        run: isort --check-only docker/monitor/app.py

  # --- React Tests ---
  frontend-test:
    needs: checkout

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: docker/frontend/package-lock.json

      - name: Install dependencies
        working-directory: docker/frontend
        run: npm ci   # ✅ deterministic install

      - name: Run React tests
        working-directory: docker/frontend
        run: npm run test -- --coverage

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [frontend, backend, monitor]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set service-specific variables
        run: |
          case "${{ matrix.service }}" in
            frontend)
              echo "IMAGE_NAME=frontend" >> $GITHUB_ENV
              echo "CONTEXT=./frontend" >> $GITHUB_ENV
              echo "PORT=8080" >> $GITHUB_ENV
              ;;
            backend)
              echo "IMAGE_NAME=backend" >> $GITHUB_ENV
              echo "CONTEXT=./backend" >> $GITHUB_ENV
              echo "PORT=3000" >> $GITHUB_ENV
              ;;
            monitor)
              echo "IMAGE_NAME=monitor" >> $GITHUB_ENV
              echo "CONTEXT=./monitor" >> $GITHUB_ENV
              echo "PORT=8000" >> $GITHUB_ENV
              ;;
          esac

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            static

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.CONTEXT }}/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}_${{ matrix.service }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ENVIRONMENT=${{ github.ref_name == 'main' && 'prod' || 'dev' }}

