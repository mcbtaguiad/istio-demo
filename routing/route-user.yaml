apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-app-user-route
spec:
  parentRefs:
    - name: backend-gateway
  rules:
    # user
    - matches:
        - path:
            type: PathPrefix
            value: /backend
          headers:
            - name: cookie
              type: RegularExpression
              value: ".*user=jonathan.*"
            - name: x-user
              type: Exact
              value: beta
      backendRefs:
        - name: backend-v2
          port: 3000

    # frontend page    - matches:
        - path:
            type: Exact
            value: /
      backendRefs:
        - name: frontend
          port: 80

    # All other backend traffic to v1
    - matches:
        - path:
            type: PathPrefix
            value: /backend
      backendRefs:
        - name: backend-v1
          port: 3000

    # Login/Register/Logout to v1
    - matches:
        - path:
            type: Exact
            value: /login
        - path:
            type: Exact
            value: /logout
        - path:
            type: Exact
            value: /register
      backendRefs:
        - name: backend-v1
          port: 3000
