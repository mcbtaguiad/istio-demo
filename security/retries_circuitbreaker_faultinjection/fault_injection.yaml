apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-app-fault
  namespace: demo
spec:
  parentRefs:
    - name: demo-app-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /backend
      filters:
        - type: FaultInjection
          faultInjection:
            delay:
              fixedDelay: 2s       # 2 seconds delay
              percentage: 50       # 50% of traffic
        - type: FaultInjection
          faultInjection:
            abort:
              httpStatus: 500       # HTTP 500
              percentage: 50        # 50% of traffic
      backendRefs:
        - name: demo-app-v1
          port: 3000
