resources:
  - ../../base

nameSuffix: -v2

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: service-patch.yaml
    target:
      kind: Service
      name: backend

  # - path: name-patch.json
