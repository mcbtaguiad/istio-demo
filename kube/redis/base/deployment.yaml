apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      serviceAccountName: redis-sa
      containers:
      - name: redis
        image: docker.io/bitnami/redis:latest
        ports:
        - containerPort: 6379
        envFrom:
        - configMapRef:
            name: redis-config

