  #     name: monitor
  #
  # - path: name-patch.json
  #   target:
  #     kind: Deployment
  #     name: monitor

configMapGenerator:
- name: monitor-config
  literals:
  - VERSION=2.0.0
  - DEMO_APP_HOST=http://192.168.254.220,https://istio-demo-dev.marktaguiad.dev,https://istio-demo-prod.marktaguiad.dev
