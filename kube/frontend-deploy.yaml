---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend-sa
      containers:
      - name: frontend
        image: docker.io/mcbtaguiad/istio-demo:frontend
        imagePullPolicy: Always
        ports:
        - containerPort: 80
      restartPolicy: Always
