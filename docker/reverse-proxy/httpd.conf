ServerRoot "/usr/local/apache2"

Listen 80

# Core modules
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule headers_module modules/mod_headers.so

# Proxy modules
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

User daemon
Group daemon

ServerName localhost
ServerAdmin you@example.com

DocumentRoot "/usr/local/apache2/htdocs"

<Directory "/usr/local/apache2/htdocs">
    AllowOverride All
    Require all granted
</Directory>

DirectoryIndex index.html

ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 combined

# =========================
# REVERSE PROXY
# =========================

ProxyPreserveHost On

# -------------------------
# Login / Register / Logout
# -------------------------
ProxyPass /login http://frontend:3000/login
ProxyPassReverse /login http://frontend:3000/login

ProxyPass /register http://frontend:3000/register
ProxyPassReverse /register http://frontend:3000/register

ProxyPass /logout http://frontend:3000/logout
ProxyPassReverse /logout http://frontend:3000/logout

# -------------------------
# Backend
# -------------------------
ProxyPass /backend http://backend:3001/backend
ProxyPassReverse /backend http://backend:3001/backend

# Forward client x-user header to backend for HTTPRoute routing
RequestHeader set X-User expr=%{HTTP:X-User}

