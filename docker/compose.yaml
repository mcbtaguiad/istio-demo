services:
  frontend:
    container_name: frontend
    image: ghcr.io/mcbtaguiad/istio-demo/frontend:main
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:80"
  backend:
    container_name: backend
    image: ghcr.io/mcbtaguiad/istio-demo/backend:main
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - VERSION=1.0.0
      - ALLOWED_HOSTS="http://localhost:8080, http://localhost:80, http://localhost:3000, http://localhost:3001"

    restart: always
    ports:
      - "3000:3000"
  monitor:
    container_name: monitor
    image: ghcr.io/mcbtaguiad/istio-demo/monitor:main
    build:
      context: ./monitor
      dockerfile: Dockerfile
    environment:
      - VERSION=1.0.0
      - DEMO_APP_HOST=http://localhost:3000
    restart: always
    ports:
      - "8000:8000"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
